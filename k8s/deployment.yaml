apiVersion: apps/v3
kind: Deployment
metadata:
  name: orderly-eats-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orderly-eats
  template:
    metadata:
      labels:
        app: orderly-eats
    spec:
      containers:
      - name: orderly-eats
        image: rudrabhingarde/romz:v3
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: orderly-eats-service
spec:
  type: NodePort
  selector:
    app: orderly-eats
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30007